# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = true

# Change command timeout from 500 to 1000 ms
command_timeout = 200

# new config вЂ” $character and $custom.venv pulled out of $all so they appear
# on the command line (after $line_break) instead of the info line above.
format = """${env_var.STARSHIP_DISTRO} $all${custom.venv}$character"""

# Change the default prompt characters
[character]
# old config
error_symbol = "[вњ—](bold cyan)"
success_symbol = "[вќЇ](bold cyan)"
#success_symbol = ""
#error_symbol = ""

[status]
style = "fg:red"
symbol = "рџ”ґ "
#success_symbol = "рџџў SUCCESS"
format = '[\[$symbol$common_meaning$signal_name $status\]]($style) '
map_symbol = true
disabled = false

# Shows an icon that should be included by zshrc script based on the distribution or os
[env_var.STARSHIP_DISTRO]
format = '[$env_value](white)'
variable = "STARSHIP_DISTRO"
disabled = false

# Shows the username
[username]
style_user = "white"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "on [$hostname](bold yellow) "
disabled = false

[directory]
fish_style_pwd_dir_length = 1
truncation_length = 1
truncation_symbol = "вЂ¦/"
home_symbol = "у°‹ћ ~"
read_only_style = "197"
read_only = " пЂЈ "
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "у°Љў "
format = "via [$symbol$branch]($style) "
# truncation_length = 4
truncation_symbol = "вЂ¦/"
style = "bold green"

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "рџЏі"
up_to_date = "пЃ† "
untracked = "п”© "
ahead = "в‡Ў${count}"
diverged = "в‡•в‡Ў${ahead_count}в‡Ј${behind_count}"
behind = "в‡Ј${count}"
stashed = "у°Џ— "
modified = "пЃ„ "
staged = '[++\($count\)](green)'
renamed = "у°–· "
deleted = "пЂ” "

[kubernetes]
format = 'via [у° і $context\($namespace\)](bold purple) '
disabled = false

# (deactivated because of no space left)
# 
[terraform]
format = "via [п„µ terraform $version]($style) у°‘ѓ [$workspace]($style) "
disabled = true

[vagrant]
format = "via [п„µ vagrant $version]($style) "
disabled = true

[docker_context]
format = "via [пЊ€ $context](bold blue) "
disabled = true

[helm]
format = "via [п€љ $version](bold purple) "
disabled = true

[python]
symbol = "у°Њ  "
python_binary = "python3"
format = 'via [${symbol}${pyenv_prefix}${version}]($style) '
disabled = false

[custom.venv]
command = 'basename "$VIRTUAL_ENV"'
when = '[ -n "$VIRTUAL_ENV" ]'
format = '[\($output\)](bold yellow) '

[nodejs]
format = "via [у°Ћ™ $version](bold green) "
disabled = true

[ruby]
format = "via [о€ѕ $version]($style) "
disabled = true
